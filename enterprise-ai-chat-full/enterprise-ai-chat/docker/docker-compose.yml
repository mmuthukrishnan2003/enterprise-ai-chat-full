version: '3.9'

services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nexusai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgre
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: chat-3
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgre -d chat-3"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexusai-net

  # ─── Redis (optional cache) ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexusai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexusai-net

  # ─── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexusai-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgre
      DB_PASSWORD: demo
      DB_NAME: chat-3
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-32-chars-min}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-change-refresh-secret-too}
      OLLAMA_BASE_URL: http://ollama:11434
      REDIS_URL: redis://redis:6379
      REDIS_ENABLED: "true"
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    ports:
      - "3000:3000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexusai-net

  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexusai-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - nexusai-net

  # ─── Ollama ──────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: nexusai-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    networks:
      - nexusai-net

  # ─── Nginx ───────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nexusai-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    networks:
      - nexusai-net

volumes:
  postgres_data:
  redis_data:
  ollama_data:

networks:
  nexusai-net:
    driver: bridge

<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="10" fill="#2563eb"/>
        <path d="M20 8C13.373 8 8 13.373 8 20C8 26.627 13.373 32 20 32C26.627 32 32 26.627 32 20C32 13.373 26.627 8 20 8ZM20 14C21.657 14 23 15.343 23 17C23 18.657 21.657 20 20 20C18.343 20 17 18.657 17 17C17 15.343 18.343 14 20 14ZM20 29C17.333 29 14.96 27.78 13.4 25.867C13.44 23.533 17.333 22.25 20 22.25C22.653 22.25 26.56 23.533 26.6 25.867C25.04 27.78 22.667 29 20 29Z" fill="white"/>
      </svg>
      <span class="login-brand">NexusAI</span>
    </div>

    <h1 class="login-title">Welcome back</h1>
    <p class="login-subtitle">Sign in to your account — or we'll create one for you</p>

    <div class="login-error" *ngIf="error">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 1a7 7 0 100 14A7 7 0 008 1zm.75 4.25a.75.75 0 00-1.5 0v3a.75.75 0 001.5 0v-3zm-.75 6a.875.875 0 100-1.75.875.875 0 000 1.75z"/>
      </svg>
      {{ error }}
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          id="username"
          type="text"
          formControlName="username"
          placeholder="Enter your username"
          autocomplete="username"
          [class.invalid]="form.get('username')?.invalid && form.get('username')?.touched"
        />
        <span class="field-error" *ngIf="form.get('username')?.invalid && form.get('username')?.touched">
          Username must be at least 3 characters
        </span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            [class.invalid]="form.get('password')?.invalid && form.get('password')?.touched"
          />
          <button type="button" class="toggle-pw" (click)="showPassword = !showPassword" tabindex="-1">
            <svg *ngIf="!showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <span class="field-error" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
          Password must be at least 6 characters
        </span>
      </div>

      <button type="submit" class="btn-login" [disabled]="loading">
        <span *ngIf="!loading">Sign in / Register</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>
    </form>

    <p class="login-hint">New here? Just type a username and password to create your account.</p>
  </div>
</div>
